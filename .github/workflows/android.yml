name: Android CI/CD

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

permissions:
  contents: write

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      # Run unit and Robolectric tests
      - name: Run Unit Tests
        run: gradle testDebugUnitTest

      # Build Debug APK
      - name: Build Debug APK
        run: gradle assembleDebug

      # Ensure apk folder exists and copy the newly built APK over
      - name: Copy and Rename APK
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/debug/app-debug.apk apk/Schrittzaehler.apk

      # Commit and Push APK back to repo if it changed, using the skip ci tag
      - name: Commit and Push APK
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add apk/Schrittzaehler.apk
          if git diff --staged --quiet; then
            echo "No changes in APK to commit"
          else
            git commit -m "Update automatically built APK [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
